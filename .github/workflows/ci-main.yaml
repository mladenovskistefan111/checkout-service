name: CI - Main

on:
  workflow_dispatch: # manual trigger via GitHub Actions UI

  # push:
  #   branches-ignore:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./cmd/server/...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/... -v -race -count=1

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/checkout-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/checkout-service@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/checkout-service@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ secrets.DOCKERHUB_USERNAME }}/checkout-service@${{ steps.push.outputs.digest }}

  # ─── STAGE 6 — E2E & Load Tests (runner-based, no cluster needed) ────────

  e2e-and-load-tests:
    name: E2E & Load Tests
    runs-on: ubuntu-latest
    needs: [push-and-sign]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      # ── Build and start the service locally ────────────────────────────
      # The E2E tests spin up their own in-process mock downstreams so
      # no external dependencies are needed. The server is started here
      # only for the grpcurl smoke test and the load test.

      - name: Build server binary
        run: go build -o /tmp/checkout-server ./cmd/server/...

      - name: Start server
        run: |
          PRODUCT_CATALOG_SERVICE_ADDR=localhost:3550 \
          CART_SERVICE_ADDR=localhost:7070 \
          CURRENCY_SERVICE_ADDR=localhost:7000 \
          SHIPPING_SERVICE_ADDR=localhost:50051 \
          PAYMENT_SERVICE_ADDR=localhost:50051 \
          EMAIL_SERVICE_ADDR=localhost:8080 \
          PORT=5050 \
          /tmp/checkout-server &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      # ── E2E tests (self-contained, in-process mocks) ───────────────────

      - name: E2E tests
        run: go test -tags e2e ./tests/e2e/... -v -timeout 60s

      # ── Smoke test ─────────────────────────────────────────────────────

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin grpcurl

      - name: Smoke test - health check
        run: |
          response=$(grpcurl -plaintext localhost:5050 grpc.health.v1.Health/Check)
          status=$(echo "$response" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          if [ "$status" != "SERVING" ]; then
            echo "FAIL: expected SERVING, got $status"
            exit 1
          fi
          echo "PASS: service is SERVING"

      # ── Load test ──────────────────────────────────────────────────────
      # The server will return errors on PlaceOrder since downstreams aren't
      # running — we assert on p99 latency only (server must not hang/OOM).

      - name: Install ghz
        run: |
          curl -sSL https://github.com/bojand/ghz/releases/download/v0.120.0/ghz-linux-x86_64.tar.gz \
            | tar -xz -C /usr/local/bin ghz

      - name: Load test
        run: |
          ghz --insecure \
            --proto proto/checkout.proto \
            --call hipstershop.CheckoutService/PlaceOrder \
            --data '{
              "user_id": "load-test-user",
              "user_currency": "USD",
              "address": {
                "street_address": "1 Load Test Ln",
                "city": "Testville",
                "state": "CA",
                "country": "US",
                "zip_code": 94105
              },
              "email": "loadtest@example.com",
              "credit_card": {
                "credit_card_number": "4111111111111111",
                "credit_card_cvv": 123,
                "credit_card_expiration_year": 2030,
                "credit_card_expiration_month": 1
              }
            }' \
            --rps 200 \
            -z 30s \
            -c 10 \
            --format json \
            -o /tmp/ghz-result.json \
            localhost:5050 || true

      - name: Check load test thresholds
        run: |
          P99=$(jq '.latencyDistribution[] | select(.percentage == 99) | .latency' /tmp/ghz-result.json)
          P99_MS=$(echo "$P99 / 1000000" | bc)
          TOTAL=$(jq '.count' /tmp/ghz-result.json)

          echo "Total requests: $TOTAL"
          echo "p99 latency: ${P99_MS}ms"

          if (( TOTAL == 0 )); then
            echo "FAIL: no requests were sent"
            exit 1
          fi

          if (( P99_MS > 500 )); then
            echo "FAIL: p99 latency ${P99_MS}ms exceeds 500ms — server may be hanging"
            exit 1
          fi

          echo "PASS: server handled load — p99=${P99_MS}ms over ${TOTAL} requests"

      # ── Teardown ───────────────────────────────────────────────────────

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true